version: '3.8'

services:
  paper-pipeline:
    build: .
    container_name: paper-pipeline
    restart: unless-stopped
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./docs:/app/docs
      - ./pdfs:/app/pdfs
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app/scripts
    networks:
      - paper-network

  # Optional: Web interface
  web:
    build: .
    container_name: paper-pipeline-web
    restart: unless-stopped
    command: python -m uvicorn src.web.app:app --host 0.0.0.0 --port 8000
    ports:
      - "8000:8000"
    volumes:
      - ./data:/app/data
      - ./reports:/app/reports
      - ./docs:/app/docs
      - ./.env:/app/.env:ro
    environment:
      - PYTHONPATH=/app/scripts
    networks:
      - paper-network

networks:
  paper-network:
    driver: bridge
