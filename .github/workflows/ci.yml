name: CI/CD Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  # 测试阶段
  test:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    
    - name: Run tests
      run: |
        python -m pytest tests/ -v --tb=short
    
    - name: Upload test results
      if: always()
      uses: actions/upload-artifact@v4
      with:
        name: test-results
        path: |
          tests/
          .pytest_cache/

  # 代码质量检查
  lint:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'
    
    - name: Install linters
      run: |
        pip install flake8 black isort
    
    - name: Run flake8
      run: |
        flake8 src/ --count --select=E9,F63,F7,F82 --show-source --statistics
        flake8 src/ --count --max-complexity=10 --max-line-length=127 --statistics
    
    - name: Check formatting
      run: |
        black --check src/
        isort --check-only src/

  # Docker构建
  build:
    runs-on: ubuntu-latest
    needs: [test, lint]
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v3
    
    - name: Build Docker image
      run: |
        docker build -t paper-pipeline:latest .
        docker build -t paper-pipeline-web:latest -f Dockerfile.web .
    
    - name: Test Docker image
      run: |
        docker run --rm paper-pipeline:latest python -c "print('Docker build OK')"
    
    - name: Save Docker images
      run: |
        docker save paper-pipeline:latest | gzip > paper-pipeline.tar.gz
        docker save paper-pipeline-web:latest | gzip > paper-pipeline-web.tar.gz
    
    - name: Upload Docker artifacts
      uses: actions/upload-artifact@v4
      with:
        name: docker-images
        path: |
          paper-pipeline.tar.gz
          paper-pipeline-web.tar.gz

  # 部署到服务器
  deploy:
    runs-on: ubuntu-latest
    needs: [test, lint, build]
    if: github.ref == 'refs/heads/main'
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Download Docker images
      uses: actions/download-artifact@v4
      with:
        name: docker-images
    
    - name: Deploy to server
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          cd /root/git/mimo/paper-pipeline
          docker compose down
          docker load < paper-pipeline.tar.gz
          docker load < paper-pipeline-web.tar.gz
          docker compose up -d
          echo "部署完成"
    
    - name: Verify deployment
      uses: appleboy/ssh-action@v1.0.0
      with:
        host: ${{ secrets.SERVER_HOST }}
        username: ${{ secrets.SERVER_USER }}
        key: ${{ secrets.SERVER_SSH_KEY }}
        script: |
          curl -s http://localhost:8000/api/health | jq .
